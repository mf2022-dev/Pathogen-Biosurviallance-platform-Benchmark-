<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Evaluation Template - PSEF v3.0.0</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-gray-900 text-white py-4 px-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="../index.html" class="flex items-center hover:text-purple-300"><i class="fas fa-arrow-left mr-2"></i>Back to Home</a>
            <span class="font-bold">PSEF v3.0.0</span>
        </div>
    </nav>
    <div class="gradient-bg text-white py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-4xl font-bold flex items-center"><i class="fas fa-clipboard mr-4"></i>Platform Evaluation Template</h1>
        </div>
    </div>
    <div class="max-w-6xl mx-auto px-6 py-8">
        
<div class="bg-white rounded-lg shadow p-8 mb-8">
    <h2 class="text-2xl font-bold mb-6">Evaluation Template</h2>
    <p class="text-gray-600 mb-6">Use this template to evaluate new pathogen surveillance platforms using the PSEF v3.0 methodology.</p>
    <form class="space-y-6">
        <div><label class="block font-bold mb-2">Platform Name</label><input type="text" class="w-full border rounded-lg p-2" placeholder="Enter platform name"></div>
        <div><label class="block font-bold mb-2">Platform URL</label><input type="url" class="w-full border rounded-lg p-2" placeholder="https://..."></div>
        <div><label class="block font-bold mb-2">Category</label><select class="w-full border rounded-lg p-2"><option>Phylogenetic Analysis</option><option>Epidemiological Data</option><option>Surveillance & Outbreak</option><option>Genomic Analysis</option><option>Laboratory System</option><option>Data Visualization</option><option>Other</option></select></div>
        <h3 class="text-xl font-bold">Scoring (0-100)</h3>
        <div class="grid md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-bold mb-1">Data Integration (12%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Analytics Capability (12%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Visualization (10%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Accessibility (10%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Scalability (10%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Documentation (8%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Community Support (8%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Security & Compliance (12%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Interoperability (10%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
            <div><label class="block text-sm font-bold mb-1">Real-Time Capability (8%)</label><input type="number" min="0" max="100" class="w-full border rounded p-2" placeholder="0-100"></div>
        </div>
        <div><label class="block font-bold mb-2">Strengths</label><textarea class="w-full border rounded-lg p-2" rows="3" placeholder="List key strengths..."></textarea></div>
        <div><label class="block font-bold mb-2">Weaknesses</label><textarea class="w-full border rounded-lg p-2" rows="3" placeholder="List key weaknesses..."></textarea></div>
        <button type="button" class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700">Calculate Composite Score</button>
    </form>
</div>
    </div>
    <footer class="bg-gray-900 text-white py-6 text-center text-sm"><p>&copy; 2026 PSEF v3.0.0</p></footer>
</body>
</html>
